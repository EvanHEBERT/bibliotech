<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bibliotech - Base de Connaissances</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background-color: #f8fafc;
    color: #0f172a;
}

.container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 20px;
}

/* Header */
.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 40px;
    padding-bottom: 20px;
    border-bottom: 1px solid #e2e8f0;
}

.logo-container {
    display: flex; 
    align-items: center; 
    gap: 12px; 
    cursor: pointer;
}

.logo-img {
    height: 50px;
    width: auto;
    object-fit: contain;
}

/* Cartes */
.card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: white;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    border: 1px solid #f1f5f9;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    justify-content: center;
    min-height: 120px;
}

.card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    border-color: #bae6fd;
}

.card img {
    max-height: 50px;
    max-width: 80%;
    margin-bottom: 16px;
    object-fit: contain;
}

/* Breadcrumb */
.breadcrumb {
    display: flex;
    gap: 8px;
    align-items: center;
    font-size: 14px;
    color: #64748b;
    margin-bottom: 30px;
    font-weight: 500;
}

.breadcrumb-item {
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
}

.breadcrumb-item:hover { background-color: #e2e8f0; }
.breadcrumb-active { color: #0284c7; }

/* Pannes */
.failure-card {
    background: white;
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    border: 1px solid #e2e8f0;
    margin-bottom: 20px;
}

.failure-title {
    margin-top: 0;
    color: #ef4444;
    display: flex;
    align-items: center;
    gap: 10px;
}

.solution-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 16px;
}

.box-cause { background: #fef2f2; padding: 16px; border-radius: 8px; }
.box-solution { background: #f0fdf4; padding: 16px; border-radius: 8px; }

.questions-box {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px dashed #cbd5e1;
}
</style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <div class="logo-container" onclick="resetAll()">
            <img src="./assets/logo.png" alt="Logo" class="logo-img">
            <div>
                <h1 style="margin: 0; font-size: 20px; color: #0f172a">Base de Connaissances</h1>
                <span style="font-size: 12px; color: #64748b">Bibliothèque technique</span>
            </div>
        </div>
        <div style="display: flex; gap: 10px;">
            <button id="btn-back" onclick="goBack()" style="display: none; padding: 8px 16px; border-radius: 8px; border: 1px solid #cbd5e1; background: white; cursor: pointer; font-weight: 600;">Retour</button>
            <button onclick="resetAll()" style="padding: 8px 16px; border-radius: 8px; border: 1px solid #cbd5e1; background: white; cursor: pointer; font-weight: 600;">Accueil</button>
        </div>
    </div>

    <!-- Zone d'affichage dynamique -->
    <div id="app-content"></div>
</div>

<script>
    // --- DONNÉES ---
    const LIBRARY_DATA = [
      {
        id: "aerosol",
        name: "Aérosol",
        brands: [
          { id: "breas", name: "Breas", models: [] },
          { id: "lowenstein", name: "Lowenstein", models: [] },
          { id: "philips", name: "Philips", models: [] },
          { id: "resmed", name: "ResMed", models: [] },
          { id: "sefam", name: "Sefam", models: [] }
        ]
      },
      { 
        id: "concentrateur", 
        name: "Concentrateur", 
        brands: [
          { id: "breas", name: "Breas", models: [] },
          { id: "lowenstein", name: "Lowenstein", models: [] },
          { id: "philips", name: "Philips", models: [] },
          { id: "resmed", name: "ResMed", models: [] },
          { id: "sefam", name: "Sefam", models: [] }
        ] 
      },
      { 
        id: "humidificateur", 
        name: "Humidificateur", 
        brands: [
          { id: "breas", name: "Breas", models: [] },
          { id: "lowenstein", name: "Lowenstein", models: [] },
          { id: "philips", name: "Philips", models: [] },
          { id: "resmed", name: "ResMed", models: [] },
          { id: "sefam", name: "Sefam", models: [] }
        ] 
      },
      { 
        id: "ppc", 
        name: "PPC", 
        brands: [
          { id: "breas", name: "Breas", models: [] },
          { id: "lowenstein", name: "Lowenstein", models: [] },
          { id: "philips", name: "Philips", models: [] },
          { id: "resmed", name: "ResMed", models: [] },
          { id: "sefam", name: "Sefam", models: [] }
        ] 
      },
      { 
        id: "vaa", 
        name: "VAA", 
        brands: [
          { id: "breas", name: "Breas", models: [] },
          { id: "lowenstein", name: "Lowenstein", models: [] },
          { id: "philips", name: "Philips", models: [] },
          { id: "resmed", name: "ResMed", models: [] },
          { id: "sefam", name: "Sefam", models: [] }
        ] 
      },
      {
        id: "vni",
        name: "VNI",
        brands: [
          { id: "niv-i", name: "NIV I", models: [] },
          { id: "niv-ii", name: "NIV II", models: [] },
          { 
            id: "niv-iii",  
            name: "NIV III", 
            models: [
              { id: "eove-150", name: "Philips Eove 150", failures: [] }
            ] 
          }
        ]
      }
    ];

    // --- ÉTAT (State) ---
    let state = { type: null, brand: null, model: null };

    // --- FONCTIONS DE NAVIGATION ---
    function selectType(typeId) {
        state.type = LIBRARY_DATA.find(t => t.id === typeId);
        state.brand = null; state.model = null;
        render();
    }
    function selectBrand(brandId) {
        state.brand = state.type.brands.find(b => b.id === brandId);
        state.model = null;
        render();
    }
    function selectModel(modelId) {
        state.model = state.brand.models.find(m => m.id === modelId);
        render();
    }
    function resetAll() { state = { type: null, brand: null, model: null }; render(); }
    function resetToType() { state.brand = null; state.model = null; render(); }
    function resetToBrand() { state.model = null; render(); }

    function goBack() {
        if (state.model) state.model = null;
        else if (state.brand) state.brand = null;
        else if (state.type) state.type = null;
        render();
    }

    // --- RENDU (Render) ---
    function render() {
        const app = document.getElementById('app-content');
        const btnBack = document.getElementById('btn-back');
        let html = '';

        // Gestion du bouton retour
        btnBack.style.display = state.type ? 'block' : 'none';

        // 1. Fil d'ariane
        html += `<div class="breadcrumb">
            <span class="breadcrumb-item ${state.type ? 'breadcrumb-active' : ''}" onclick="resetAll()">Accueil</span>`;
        if (state.type) html += `<span>/</span><span class="breadcrumb-item ${state.brand ? 'breadcrumb-active' : ''}" onclick="resetToType()">${state.type.name}</span>`;
        if (state.brand) html += `<span>/</span><span class="breadcrumb-item ${state.model ? 'breadcrumb-active' : ''}" onclick="resetToBrand()">${state.brand.name}</span>`;
        if (state.model) html += `<span>/</span><span class="breadcrumb-item">${state.model.name}</span>`;
        html += `</div>`;

        // 2. Contenu
        if (!state.type) {
            html += `<h2>Sélectionnez le type d'équipement</h2><div class="card-grid">`;
            LIBRARY_DATA.forEach(type => {
                html += `<div class="card" onclick="selectType('${type.id}')"><div style="font-size: 18px; font-weight: bold;">${type.name}</div></div>`;
            });
            html += `</div>`;
        } else if (!state.brand) {
            const isVni = state.type.id === 'vni';
            const sectionTitle = isVni ? 'Type' : 'Marque';
            html += `<h2>${sectionTitle} (${state.type.name})</h2><div class="card-grid">`;
            if (state.type.brands.length === 0) html += `<p>Aucun élément répertorié.</p>`;
            state.type.brands.forEach(brand => {
                const imgTag = brand.logo ? `<img src="${brand.logo}" alt="${brand.name}" onerror="this.style.display='none'">` : '';
                html += `<div class="card" onclick="selectBrand('${brand.id}')">${imgTag}<div style="font-size: 18px; font-weight: bold;">${brand.name}</div></div>`;
            });
            html += `</div>`;
        } else if (!state.model) {
            html += `<h2>Modèle (${state.brand.name})</h2><div class="card-grid">`;
            if (state.brand.models.length === 0) html += `<p>Aucun modèle répertorié.</p>`;
            state.brand.models.forEach(model => {
                html += `<div class="card" onclick="selectModel('${model.id}')"><div style="font-size: 18px; font-weight: bold;">${model.name}</div></div>`;
            });
            html += `</div>`;
        } else {
            html += `<h2 style="border-bottom: 2px solid #0284c7; display: inline-block; padding-bottom: 4px;">Guide de dépannage : ${state.model.name}</h2>`;
            if (state.model.failures.length === 0) {
                html += `<p style="color: #64748b; font-style: italic;">Aucune panne connue enregistrée.</p>`;
            } else {
                state.model.failures.forEach(failure => {
                    const questionsHtml = failure.questions.map(q => `<li>${q}</li>`).join('');
                    html += `
                        <div class="failure-card">
                            <h3 class="failure-title">⚠️ ${failure.title}</h3>
                            <div class="solution-grid">
                                <div class="box-cause"><strong style="color: #991b1b; display: block; margin-bottom: 8px;">Cause probable</strong><div style="color: #7f1d1d;">${failure.cause}</div></div>
                                <div class="box-solution"><strong style="color: #166534; display: block; margin-bottom: 8px;">Solution recommandée</strong><div style="color: #14532d;">${failure.solution}</div></div>
                            </div>
                            <div class="questions-box"><strong style="display: block; margin-bottom: 10px;">❓ Questions à poser au client :</strong><ul style="margin: 0; padding-left: 20px; color: #334155;">${questionsHtml}</ul></div>
                        </div>`;
                });
            }
        }
        app.innerHTML = html;
    }
    render();
</script>
</body>
</html>
