<style>
body {
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background-color: #f8fafc;
    color: #0f172a;
}

.container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 20px;
}     

/* Header */
.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 40px;
    padding-bottom: 20px;
    border-bottom: 1px solid #e2e8f0;
}

.logo-container {
    display: flex; 
    align-items: center; 
    gap: 12px; 
    cursor: pointer;
}

.logo-img {
    height: 50px;
    width: auto;
    object-fit: contain;
}

/* Cartes */
.card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: white;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    border: 1px solid #f1f5f9;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    justify-content: center;
    min-height: 120px;
}

.card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    border-color: #bae6fd;
}

.card img {
    max-height: 50px;
    max-width: 80%;
    margin-bottom: 16px;
    object-fit: contain;
}

/* Breadcrumb */
.breadcrumb {
    display: flex;
    gap: 8px;
    align-items: center;
    font-size: 14px;
    color: #64748b;
    margin-bottom: 30px;
    font-weight: 500;
}

.breadcrumb-item {
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
}

.breadcrumb-item:hover { background-color: #e2e8f0; }
.breadcrumb-active { color: #0284c7; }

/* Pannes */
.failure-card {
    background: white;
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    border: 1px solid #e2e8f0;
    margin-bottom: 20px;
}

.failure-title {
    margin-top: 0;
    color: #ef4444;
    display: flex;
    align-items: center;
    gap: 10px;
}

.solution-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 16px;
}

.box-cause { background: #fef2f2; padding: 16px; border-radius: 8px; }
.box-solution { background: #f0fdf4; padding: 16px; border-radius: 8px; }

.questions-box {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px dashed #cbd5e1;
}

.solution-item {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
}
.solution-item input[type="checkbox"] {
    width: 1.15em;
    height: 1.15em;
    cursor: pointer;
}
.solution-item label {
    cursor: pointer;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

                    { id: "resmed", name: "ResMed", models: [

                            { title: "Batterie interne", causes: ["Batterie vieillissante"], solutionsPatient: ["Vérifier le cordon d'alimentation"], solutionsTech: ["Remplacer la batterie interne"] },
                            { title: "Alarme débit", causes: ["Circuit obstrué", "Capteur encrassé", "Module défectueux"], solutionsPatient: ["Vérifier le masque et le circuit", "Nettoyer l'appareil"], solutionsTech: ["Remplacer le module"] },

                        ]}
                    ]}
                ] 
            }

      }
    ];

    // --- ÉTAT (State) ---
    let state = { type: null, subType: null, subSubType: null, brand: null, model: null, failure: null, showTech: false, stepIndex: 0 };

    // --- FONCTIONS DE NAVIGATION ---
    function selectType(typeId) {
        state.type = LIBRARY_DATA.find(t => t.id === typeId);
        state.subType = null; state.subSubType = null; state.brand = null; state.model = null; state.failure = null;
        render();
    }
    function selectSubType(subTypeId) {
        state.subType = state.type.subTypes.find(s => s.id === subTypeId);
        state.subSubType = null; state.brand = null; state.model = null; state.failure = null;
        render();
    }
    function selectSubSubType(subSubTypeId) {
        state.subSubType = state.subType.subTypes.find(s => s.id === subSubTypeId);
        state.brand = null; state.model = null; state.failure = null;
        render();
    }
    function selectBrand(brandId) {
        const source = state.subSubType || state.subType || state.type;
        state.brand = source.brands.find(b => b.id === brandId);
        state.model = null; state.failure = null;
        render();
    }
    function selectModel(modelId) {
        const source = state.brand || state.subSubType || state.subType || state.type;
        state.model = source.models.find(m => m.id === modelId);
        state.failure = null;
        render();
    }
    function selectFailure(failureIndex) {
        state.failure = state.model.failures[failureIndex];
        state.showTech = false;
        state.stepIndex = 0;
        render();
    }
    function nextStep() {
        state.stepIndex++;
        render();
    }
    
    function resetAll() { state = { type: null, subType: null, subSubType: null, brand: null, model: null, failure: null, showTech: false, stepIndex: 0 }; render(); }
    function resetToType() { state.subType = null; state.subSubType = null; state.brand = null; state.model = null; state.failure = null; state.showTech = false; state.stepIndex = 0; render(); }
    function resetToSubType() { state.subSubType = null; state.brand = null; state.model = null; state.failure = null; state.showTech = false; state.stepIndex = 0; render(); }
    function resetToSubSubType() { state.brand = null; state.model = null; state.failure = null; state.showTech = false; state.stepIndex = 0; render(); }
    function resetToBrand() { state.model = null; state.failure = null; render(); }
    function resetToModel() { state.failure = null; render(); }

    function goBack() {
        if (state.failure) state.failure = null;
        else if (state.model) state.model = null;
        else if (state.brand) state.brand = null;
        else if (state.subSubType) state.subSubType = null;
        else if (state.subType) state.subType = null;
        else if (state.type) state.type = null;
        render();
    }

    // --- RENDU (Render) ---
    function render() {
        const app = document.getElementById('app-content');
        const btnBack = document.getElementById('btn-back');
        let html = '';

        // Gestion du bouton retour
        btnBack.style.display = state.type ? 'block' : 'none';

        // 1. Fil d'ariane
        html += `<div class="breadcrumb">
            <span class="breadcrumb-item ${state.type ? 'breadcrumb-active' : ''}" onclick="resetAll()">Accueil</span>`;
        if (state.type) {
            html += `<span>/</span><span class="breadcrumb-item ${state.subType || state.brand ? 'breadcrumb-active' : ''}" onclick="resetToType()">${state.type.name}</span>`;
        }
        if (state.subType) {
            html += `<span>/</span><span class="breadcrumb-item ${state.subSubType || state.brand ? 'breadcrumb-active' : ''}" onclick="resetToSubType()">${state.subType.name}</span>`;
        }
        if (state.subSubType) {
            html += `<span>/</span><span class="breadcrumb-item ${state.brand ? 'breadcrumb-active' : ''}" onclick="resetToSubSubType()">${state.subSubType.name}</span>`;
        }
        if (state.brand) {
            html += `<span>/</span><span class="breadcrumb-item ${state.model ? 'breadcrumb-active' : ''}" onclick="resetToBrand()">${state.brand.name}</span>`;
        }
        if (state.model) {
            html += `<span>/</span><span class="breadcrumb-item ${state.failure ? 'breadcrumb-active' : ''}" onclick="resetToModel()">${state.model.name}</span>`;
        }
        if (state.failure) {
            html += `<span>/</span><span class="breadcrumb-item">${state.failure.title}</span>`;
        }
        html += `</div>`;

        // 2. Contenu
        if (!state.type) {
            html += `<h2>Sélectionnez le type d'équipement</h2><div class="card-grid">`;
            LIBRARY_DATA.forEach(type => {
                html += `<div class="card" onclick="selectType('${type.id}')"><div style="font-size: 18px; font-weight: bold;">${type.name}</div></div>`;
            });
            html += `</div>`;
        } else if (state.type.subTypes && !state.subType) {
            // VNI Flow: Select NIV Level
            html += `<h2>Type (${state.type.name})</h2><div class="card-grid">`;
            state.type.subTypes.forEach(subType => {
                html += `<div class="card" onclick="selectSubType('${subType.id}')"><div style="font-size: 18px; font-weight: bold;">${subType.name}</div></div>`;
            });
            html += `</div>`;
        } else if (state.subType && state.subType.subTypes && !state.subSubType) {
            // Niveau supplémentaire (ex: Concentrateur -> Fixe/Portable)
            html += `<h2>Type (${state.subType.name})</h2><div class="card-grid">`;
            state.subType.subTypes.forEach(sub => {
                html += `<div class="card" onclick="selectSubSubType('${sub.id}')"><div style="font-size: 18px; font-weight: bold;">${sub.name}</div></div>`;
            });
            html += `</div>`;
        } else if (!state.brand && ( (state.type && state.type.brands) || (state.subType && state.subType.brands) || (state.subSubType && state.subSubType.brands) ) ) {
            // Étape de sélection de la marque (pour VNI, VAA, PPC)
            const source = state.subSubType || state.subType || state.type;
            const title = source.name ? `Marque (${source.name})` : `Marque`;
            html += `<h2>${title}</h2><div class="card-grid">`;
            if (!source.brands || source.brands.length === 0) {
                html += `<p>Aucune marque répertoriée.</p>`;
            } else {
                source.brands.forEach(brand => {
                    const imgTag = brand.logo ? `<img src="${brand.logo}" alt="${brand.name}" onerror="this.style.display='none'">` : '';
                    html += `<div class="card" onclick="selectBrand('${brand.id}')">${imgTag}<div style="font-size: 18px; font-weight: bold;">${brand.name}</div></div>`;
                });
            }
            html += `</div>`;
        } else if (!state.model) {
            // Étape de sélection du modèle
            const source = state.brand || state.subSubType || state.subType || state.type;
            const title = source.name ? `Modèle (${source.name})` : `Modèle`;
            html += `<h2>${title}</h2><div class="card-grid">`;
            if (!source.models || source.models.length === 0) {
                html += `<p>Aucun modèle répertorié.</p>`;
            } else {
                source.models.forEach(model => {
                    html += `<div class="card" onclick="selectModel('${model.id}')"><div style="font-size: 18px; font-weight: bold;">${model.name}</div></div>`;
                });
            }
            html += `</div>`;
        } else if (!state.failure) {
            // Vue : Choix du problème
            html += `<h2>Problèmes connus pour : ${state.model.name}</h2>`;
            if (state.model.failures.length === 0) {
                html += `<p style="color: #64748b; font-style: italic;">Aucune panne connue enregistrée.</p>`;
            } else {
                html += `<div class="card-grid">`;
                state.model.failures.forEach((failure, index) => {
                    html += `<div class="card" onclick="selectFailure(${index})"><div style="font-size: 18px; font-weight: bold;">${failure.title}</div></div>`;
                });
                html += `</div>`;
            }
        } else {
            // Vue : Détail du problème (causes et solutions)
            const failure = state.failure;
            const causesHtml = failure.causes.map((cause, idx) => `
                <div class="solution-item">
                    <input type="checkbox" id="cause-${idx}">
                    <label for="cause-${idx}">${cause}</label>
                </div>
            `).join('');
            
            // Logique du guide étape par étape
            const patientSteps = failure.solutionsPatient || [];
            const techSteps = failure.solutionsTech || [];
            const totalPatientSteps = patientSteps.length;
            
            let guideContent = '';
            
            // Cas 1 : On est dans les étapes Patient
            if (state.stepIndex < totalPatientSteps) {
                guideContent = `
                    <div class="step-card">
                        <div class="step-number">Étape Patient ${state.stepIndex + 1} / ${totalPatientSteps}</div>
                        <div class="step-instruction">${patientSteps[state.stepIndex]}</div>
                        <div class="step-actions">
                            <button class="btn-action btn-yes" onclick="resetToModel()">✅ Résolu</button>
                            <button class="btn-action btn-no" onclick="nextStep()">❌ Non résolu, étape suivante</button>
                        </div>
                    </div>
                `;
            } 
            // Cas 2 : Transition vers Technicien (si non autorisé encore)
            else if (state.stepIndex === totalPatientSteps && !state.showTech) {
                guideContent = `
                    <div class="step-card" style="border-color: #f59e0b; background: #fffbeb;">
                        <div class="step-instruction" style="color: #b45309;">⚠️ Les solutions patient n'ont pas fonctionné.<br>Voulez-vous passer aux étapes technicien ?</div>
                        <div class="step-actions">
                            <button class="btn-action btn-tech" onclick="state.showTech = true; render()">🛠️ Oui, je suis technicien</button>
                            <button class="btn-action btn-restart" onclick="resetToModel()">Retour au modèle</button>
                        </div>
                    </div>
                `;
            }
            // Cas 3 : Étapes Technicien
            else if (state.stepIndex < totalPatientSteps + techSteps.length) {
                const techIndex = state.stepIndex - totalPatientSteps;
                guideContent = `
                    <div class="step-card" style="border-color: #f59e0b;">
                        <div class="step-number" style="color: #d97706;">Étape Technicien ${techIndex + 1} / ${techSteps.length}</div>
                        <div class="step-instruction">${techSteps[techIndex]}</div>
                        <div class="step-actions">
                            <button class="btn-action btn-yes" onclick="resetToModel()">✅ Résolu</button>
                            <button class="btn-action btn-no" onclick="nextStep()">❌ Non résolu, étape suivante</button>
                        </div>
                    </div>
                `;
            }
            // Cas 4 : Échec total
            else {
                guideContent = `
                    <div class="step-card" style="border-color: #ef4444; background: #fef2f2;">
                        <div class="step-instruction" style="color: #991b1b;">❌ Toutes les solutions ont été tentées.<br>Le problème persiste.</div>
                        <div style="margin-bottom: 20px; color: #7f1d1d;">Veuillez contacter le support niveau 2 ou procéder au remplacement de l'appareil.</div>
                        <div class="step-actions">
                            <button class="btn-action btn-restart" onclick="resetToModel()">Terminer l'intervention</button>
                        </div>
                    </div>
                `;
            }

            html += `<h2 style="border-bottom: 2px solid #0284c7; display: inline-block; padding-bottom: 4px;">Guide de dépannage : ${state.model.name}</h2>`;
            html += `
                <div class="failure-card">
                    <h3 class="failure-title">⚠️ ${failure.title}</h3>
                    <div class="solution-grid">
                        <div class="box-cause"><strong style="color: #991b1b; display: block; margin-bottom: 8px;">Causes probables</strong><div style="color: #7f1d1d;">${causesHtml}</div></div>
                        <div class="box-solution" style="display: flex; flex-direction: column; justify-content: center;">
                            ${guideContent}
                        </div>
                    </div>
                </div>`;
        }
        app.innerHTML = html;
    }
    render();
</script>
